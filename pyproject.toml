[project]
name = "cardarena-remote-stage"
version = "0.1.0"
description = "Production-ready Chromium-based kiosk browser engine"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "playwright>=1.48.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]