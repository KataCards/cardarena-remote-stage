<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 Server Error</title>
  <style>
    :root {
      --bg: #13161c;
      --panel: #1d2330;
      --ink: #f6f7fb;
      --accent: #ff8c42;
      --muted: #b8c0d4;
      --border: #30394b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: "Segoe UI", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 140, 66, 0.16), transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    main {
      width: min(720px, 100%);
      padding: 38px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.28);
    }

    .code {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 68px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">500</p>
    <h1>Internal server error</h1>
    <p>This is an example fallback page for unexpected upstream server failures.</p>
  </main>
</body>
</html>
