<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>502 Bad Gateway</title>
  <style>
    :root {
      --bg: #eef6f4;
      --card: #ffffff;
      --ink: #14302b;
      --accent: #0f766e;
      --muted: #4b635e;
      --border: #c6ddda;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #e1f2ee, var(--bg));
      color: var(--ink);
    }

    main {
      width: min(700px, 100%);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 18px 56px rgba(20, 48, 43, 0.10);
    }

    .code {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 66px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 31px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">502</p>
    <h1>Bad gateway</h1>
    <p>This example page is useful when the kiosk can reach an intermediary but not the upstream service.</p>
  </main>
</body>
</html>
