<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --card: #fffaf2;
      --ink: #1e1c19;
      --accent: #b44c2f;
      --muted: #6f655d;
      --border: #d9c8b5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(180, 76, 47, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg), #efe5d8);
      color: var(--ink);
    }

    main {
      width: min(720px, 100%);
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 18px 60px rgba(30, 28, 25, 0.10);
    }

    .code {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 72px;
      line-height: 1;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>This is an example local error page. Replace this file with your branded kiosk fallback.</p>
  </main>
</body>
</html>
