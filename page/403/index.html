<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 Forbidden</title>
  <style>
    :root {
      --bg: #f3f0ff;
      --card: #ffffff;
      --ink: #1f1738;
      --accent: #5f3dc4;
      --muted: #5b5670;
      --border: #d8d1f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background: linear-gradient(180deg, #ebe5ff, var(--bg));
      color: var(--ink);
    }

    main {
      width: min(680px, 100%);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 16px 48px rgba(31, 23, 56, 0.10);
    }

    .code {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 64px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">403</p>
    <h1>Access denied</h1>
    <p>This example page is served when a mapped request returns HTTP 403.</p>
  </main>
</body>
</html>
